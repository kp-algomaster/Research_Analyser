<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Matches the Research Analyser app icon:
      • Tilted paper/document card
      • Amber knowledge-graph nodes + edges (rendered in currentColor)
      • Circular review-badge (bottom-right) with magnifying-glass glyph
  -->

  <!-- Paper card — slight -7° tilt, centred at (10.5, 10.5) -->
  <g transform="rotate(-7, 10.5, 10.5)">
    <!-- Card body -->
    <rect x="3.5" y="2.8" width="14" height="16.4" rx="1.2"
          fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.3"/>
    <!-- Rule lines -->
    <line x1="5.8" y1="7.5"  x2="15.2" y2="7.5"  stroke-width="0.9" stroke-opacity="0.7"/>
    <line x1="5.8" y1="10.5" x2="15.2" y2="10.5" stroke-width="0.9" stroke-opacity="0.7"/>
  </g>

  <!-- Knowledge-graph overlay -->
  <!-- Edges (drawn behind nodes) -->
  <line x1="9.5" y1="13.5" x2="6.5"  y2="11.5" stroke-width="1.1"/>
  <line x1="9.5" y1="13.5" x2="13"   y2="12.5" stroke-width="1.1"/>
  <line x1="9.5" y1="13.5" x2="10.5" y2="10.5" stroke-width="1.1"/>
  <line x1="6.5" y1="11.5" x2="10.5" y2="10.5" stroke-width="1.1"/>

  <!-- Nodes -->
  <circle cx="9.5"  cy="13.5" r="1.4" fill="currentColor" stroke="none"/><!-- hub -->
  <circle cx="6.5"  cy="11.5" r="1.0" fill="currentColor" stroke="none"/>
  <circle cx="13"   cy="12.5" r="1.0" fill="currentColor" stroke="none"/>
  <circle cx="10.5" cy="10.5" r="1.0" fill="currentColor" stroke="none"/>

  <!-- Review badge — circular, bottom-right -->
  <circle cx="19.2" cy="19.2" r="3.6"
          fill="currentColor" fill-opacity="0.15"
          stroke="currentColor" stroke-width="1.2"/>
  <!-- Magnifying-glass lens -->
  <circle cx="18.3" cy="18.3" r="1.7" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- Handle -->
  <line x1="19.5" y1="19.5" x2="21"  y2="21"   stroke-width="1.5"/>
</svg>
